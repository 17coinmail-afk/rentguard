services:
  - type: web
    name: rentguard-bot
    runtime: docker
    plan: free
    port: 10000
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: PRICE_PER_PROPERTY
        value: 500
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///data/rentguard.db
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1