<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RentGuard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🏠 RentGuard</h1>
            <p id="user-name">Загрузка...</p>
        </div>

        <div id="subscription-banner" class="sub-banner">
            🎁 Пробный период: 7 дней
        </div>

        <div class="nav">
            <button onclick="showPage('dashboard')" class="nav-btn active">Главная</button>
            <button onclick="showPage('properties')" class="nav-btn">Объекты</button>
            <button onclick="showPage('add')" class="nav-btn">+</button>
        </div>

        <div id="page-dashboard" class="page">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="dash-count">0</span>
                    <span class="stat-label">Объектов</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="dash-income">0 ₽</span>
                    <span class="stat-label">Доход/мес</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="dash-paid" style="color:#2ed573">0</span>
                    <span class="stat-label">Оплачено</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="dash-overdue" style="color:#ff4757">0</span>
                    <span class="stat-label">Просрочено</span>
                </div>
            </div>
            <div id="upcoming-payments" class="section">
                <h3>📅 Ближайшие платежи</h3>
                <div id="payments-list" class="list"></div>
            </div>
            <button onclick="showPage('add')" class="btn-primary btn-full">➕ Добавить объект</button>
        </div>

        <div id="page-properties" class="page hidden">
            <div id="properties-list" class="list">
                <p>Загрузка...</p>
            </div>
        </div>

        <div id="page-add" class="page hidden">
            <form id="add-form" class="form">
                <h2>Добавить объект</h2>
                <input type="text" name="name" placeholder="Название (например, 2-к квартира)" required>
                <input type="text" name="address" placeholder="Адрес">
                <input type="number" name="rent_amount" placeholder="Сумма аренды (₽)" required>
                <input type="number" name="payment_day" placeholder="День оплаты (1-31)" min="1" max="31" value="1" required>
                <input type="text" name="tenant_name" placeholder="ФИО арендатора">
                <input type="text" name="tenant_phone" placeholder="Телефон арендатора">
                <input type="text" name="tenant_tg" placeholder="Telegram арендатора (@username)">
                <input type="number" name="deposit" placeholder="Залог (₽)" value="0">
                <button type="submit" class="btn-primary">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
